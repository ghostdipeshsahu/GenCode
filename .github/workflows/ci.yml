name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Syntax compile (no LLM calls)
        run: |
          python -m compileall backend scripts

      - name: Validate every enriched question
        # Pure Python — runs each reference_code against sample + hidden tests.
        # No API key required.
        run: python scripts/validate_questions.py

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build production bundle
        # VITE_API_BASE_URL stays empty for the CI build; the deployed Vercel
        # project sets it to the Railway backend URL.
        run: npm run build
